    - data:
        classes:
        - id: '1'
          name: 通用问题
        - id: '2'
          name: 机器学习问题
        - id: '3'
          name: 大模型问题
        desc: 将用户问题识别为普通问答、机器学习问答或大模型问答
        instructions: |
          请根据用户问题的主题进行三分类：

          - 通用问题：不属于机器学习或大模型领域的问题，例如生活常识、闲聊、写作润色、普通知识问答
          - 机器学习问题：涉及监督学习、无监督学习、分类、回归、聚类、决策树、SVM、过拟合、交叉验证、特征工程、评估指标等
          - 大模型问题：涉及 Transformer、Prompt、RAG、微调、LoRA、Agent、上下文窗口、幻觉、多模态、Embedding 等

          只选择最匹配的一类。
