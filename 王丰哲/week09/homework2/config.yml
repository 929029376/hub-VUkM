app:
  description: 通过问题分类器将用户问题分流到普通问答、机器学习知识库或大模型知识库
  icon: books
  icon_background: '#DFF6DD'
  mode: advanced-chat
  name: 作业2-意图识别-双知识库RAG
  use_icon_as_answer_icon: false
