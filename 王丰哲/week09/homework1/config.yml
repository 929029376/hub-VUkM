    - data:
        code: |
          def main(sex: str, age: int, height: float, weight: float) -> dict:
              if height <= 0 or weight <= 0 or age <= 0:
                  return {
                      "bmi": 0,
                      "body_fat_percentage": 0,
                      "bmi_status": "数据异常",
                      "body_fat_status": "数据异常",
                      "age_group": "未知",
                      "attention_hint": "请输入有效的年龄、身高和体重。"
                  }

              bmi = weight / ((height / 100) ** 2)
              bmi = round(bmi, 2)

              sex_flag = 1 if sex == "男" else 0
              body_fat_percentage = 1.2 * bmi + 0.23 * age - 10.8 * sex_flag - 5.4
              body_fat_percentage = max(0, min(round(body_fat_percentage, 2), 60))

              if bmi < 18.5:
                  bmi_status = "偏瘦"
              elif bmi < 24:
                  bmi_status = "正常"
              elif bmi < 28:
                  bmi_status = "超重"
              else:
                  bmi_status = "肥胖"

              if age < 18:
                  age_group = "未成年"
              elif age < 40:
                  age_group = "18-39岁"
              elif age < 60:
                  age_group = "40-59岁"
              else:
                  age_group = "60岁及以上"

              if sex == "男":
                  if age < 40:
                      low, normal, high = 8, 19, 24
                  elif age < 60:
                      low, normal, high = 11, 21, 28
                  else:
                      low, normal, high = 13, 24, 30
              else:
                  if age < 40:
                      low, normal, high = 21, 32, 38
                  elif age < 60:
                      low, normal, high = 23, 33, 39
                  else:
                      low, normal, high = 24, 35, 41

              if body_fat_percentage < low:
                  body_fat_status = "体脂偏低"
              elif body_fat_percentage <= normal:
                  body_fat_status = "体脂正常"
              elif body_fat_percentage <= high:
                  body_fat_status = "体脂偏高"
              else:
                  body_fat_status = "体脂过高"

              hints = []
              if age < 18:
                  hints.append("未成年人处于生长发育阶段，建议在家长和专业人士指导下调整饮食和运动。")
              elif age >= 60:
                  hints.append("60岁及以上人群更需要关注关节负担、肌肉流失和慢病风险，运动宜循序渐进。")

              if bmi_status in {"超重", "肥胖"} or body_fat_status in {"体脂偏高", "体脂过高"}:
                  hints.append("当前体重或体脂控制压力较大，建议优先稳定作息、控制总热量并增加规律运动。")
              elif bmi_status == "偏瘦" or body_fat_status == "体脂偏低":
                  hints.append("需关注营养摄入是否充足，避免为了减脂而过度节食。")
              else:
                  hints.append("整体处于相对理想区间，重点是保持稳定习惯。")

              return {
                  "bmi": bmi,
                  "body_fat_percentage": body_fat_percentage,
                  "bmi_status": bmi_status,
                  "body_fat_status": body_fat_status,
                  "age_group": age_group,
                  "attention_hint": " ".join(hints)
              }
        code_language: python3
        desc: 计算 BMI、体脂率，并根据年龄段给出状态判断
        outputs:
          age_group:
            children: null
            type: string
          attention_hint:
            children: null
